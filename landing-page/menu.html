    <style>
        /* ── Restaurant brand bar ── */
        .restaurant-brand {
            text-align: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            margin-bottom: 15px;
        }

        .restaurant-brand img {
            height: 60px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .restaurant-brand h3 {
            font-size: 20px;
            color: #1b3a6b;
            margin: 0;
            font-weight: 700;
        }

        /* ── Controls Wrapper ── */
        .menu-controls-wrapper {
            margin-bottom: 20px;
        }

        .menu-search-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .search-container {
            flex: 1;
            max-width: 500px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            height: 36px;
            padding: 0 12px;
            border-radius: 18px;
            border: 2px solid #eee;
            outline: none;
            font-size: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            transition: border-color 0.3s;
        }

        .search-container input:focus {
            border-color: #1b3a6b;
        }

        .categories-btn-wrapper {
            flex-shrink: 0;
        }

        .categories-btn {
            padding: 0 12px !important;
            font-size: 12px !important;
            height: 36px !important;
            line-height: 36px !important;
            border-radius: 18px !important;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .categories-btn i {
            margin-right: 8px;
            margin-left: 0;
        }

        .menu-filter-sort-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .menu-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .filter-btn {
            border: 2px solid #eee;
            padding: 4px 12px;
            margin: 0;
            border-radius: 30px;
            background: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 11px;
            color: #666;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: #1b3a6b;
            border-color: #1b3a6b;
            color: #fff;
        }

        .sort-select-wrapper {
            flex-shrink: 0;
        }

        .sort-select {
            height: 36px !important;
            padding: 0 10px !important;
            border-radius: 18px !important;
            outline: none;
            font-size: 12px !important;
            color: #666;
            cursor: pointer;
            background-color: #fff;
            min-width: 130px !important;
        }

        /* ── Menu items ── */
        .menu-category {
            margin-bottom: 30px;
        }

        .menu-category h3 {
            font-size: 18px;
            font-weight: 700;
            color: #1b3a6b;
            margin-bottom: 15px;
            padding-bottom: 6px;
            border-bottom: 2px solid #1b3a6b;
            display: inline-block;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            padding: 8px;
            background: #fff;
            margin-bottom: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #eee;
            transition: transform 0.3s;
        }

        .menu-top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        .menu-main-content {
            display: flex;
            align-items: flex-start;
            flex-grow: 1;
            overflow: hidden;
        }

        .menu-item:hover {
            transform: translateY(-3px);
        }

        .menu-left h4 {
            margin: 0;
            font-size: 13px;
            display: flex;
            align-items: center;
            font-weight: 600;
            flex-wrap: wrap;
            gap: 4px;
        }

        .menu-left p {
            margin: 2px 0 0;
            font-size: 11px;
            color: #777;
        }

        .menu-right {
            font-weight: 700;
            color: #1b3a6b;
            font-size: 13px;
            white-space: nowrap;
            margin-left: 6px;
            margin-right: 6px;
        }

        .dish-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .egg-icon {
            width: 12px;
            height: 12px;
            border: 2px solid #856404;
            display: inline-block;
            margin-right: 4px;
            position: relative;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        }

        .egg-icon::after {
            content: "";
            width: 4px;
            height: 4px;
            background: #856404;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
        }

        /* ── Veg / Non-veg icons ── */
        .veg-icon,
        .nonveg-icon {
            width: 12px;
            height: 12px;
            border: 2px solid;
            display: inline-block;
            margin-right: 4px;
            position: relative;
        }

        .veg-icon {
            border-color: green;
        }

        .veg-icon::after {
            content: "";
            width: 4px;
            height: 4px;
            background: green;
            position: absolute;
            top: 2px;
            left: 2px;
        }

        .nonveg-icon {
            border-color: red;
        }

        .nonveg-icon::after {
            content: "";
            width: 4px;
            height: 4px;
            background: red;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
        }

        .badge-special {
            font-size: 8px;
            background: #fff3cd;
            color: #856404;
            padding: 1px 4px;
            border-radius: 4px;
            margin-left: 4px;
            white-space: nowrap;
        }

        .badge-unavailable {
            font-size: 8px;
            background: #f8d7da;
            color: #721c24;
            padding: 1px 4px;
            border-radius: 4px;
            margin-left: 4px;
            white-space: nowrap;
        }

        .badge-customizable {
            font-size: 8px;
            background: #e0f2fe;
            color: #0284c7;
            padding: 1px 4px;
            border-radius: 4px;
            margin-left: 4px;
            white-space: nowrap;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* ── Customizations Collapsible ── */
        .customization-wrapper {

            font-size: 11px;
            color: #0284c7;
            font-weight: 600;

            display: inline-flex;

        .customization-content {

        .customization-section {

        .customization-section:last-child {

        }

        .customization-section-title {

            font-weight: 700;
            color: #475569;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .variant-list, .addon-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .variant-item, .addon-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            font-size: 11px;
            color: #64748b;
        }

        .variant-left-side {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .variant-size, .addon-name {
            font-weight: 500;
            color: #334155;
            background: #f1f5f9;
            padding: 1px 6px;
            border-radius: 4px;
        }

        .variant-price, .addon-price {
            color: #23b3f4;
            font-weight: 700;
        }

        .variant-extra {
            font-style: italic;
            font-size: 10px;
            color: #94a3b8;
        }

        /* ── Modal styling ── */
        .modal-content {
            border-radius: 15px;
        }

        .menu-links {
            list-style: none;
            padding: 0;
        }

        .menu-links li a {
            display: block;
            padding: 12px 15px;
            color: #333;
            border-bottom: 1px solid #eee;
            transition: background 0.3s;
        }

        .menu-links li a:hover {
            background: #f8f9fa;
            color: #1b3a6b;
        }

        /* ── Loading Spinner ── */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-top: 4px solid #1b3a6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Responsive styling */
        @media (max-width: 768px) {
            .menu-controls-wrapper {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                margin-bottom: 20px;
            }
            
            .menu-search-row,
            .menu-filter-sort-row {
                display: contents;
            }
            
            .search-container {
                grid-row: 1;
                grid-column: 1 / -1;
            }
            
            .categories-btn-wrapper {
                grid-row: 2;
                grid-column: 1;
            }
            
            .sort-select-wrapper {
                grid-row: 2;
                grid-column: 2;
            }
            
            .menu-filter {
                grid-row: 3;
                grid-column: 1 / -1;
                
                display: flex;
                justify-content: space-between;
                flex-wrap: nowrap;
                overflow-x: auto;
                padding: 5px 15px 10px 15px;
                margin: 0 -15px;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                gap: 5px;
            }

            .menu-filter::-webkit-scrollbar {
                display: none;
            }

            .filter-btn {
                padding: 4px 10px;
                font-size: 11px;
                flex: 1 1 auto;
                min-width: 0;
                justify-content: center;
                white-space: nowrap;
            }

            .categories-btn-wrapper .theme-btn,
            .sort-select-wrapper .sort-select {
                width: 100%;
                height: 36px !important;
                font-size: 12px !important;
                padding: 0 10px !important;
                display: flex;
                align-items: center;
                justify-content: center;
                box-sizing: border-box;
                border-radius: 18px !important;
            }
            
            .categories-btn-wrapper .theme-btn {
                margin: 0;
                line-height: normal;
            }
        }

        .breadcumb-container-wrapper {
            padding: 20px 0 !important;
        }

        @media (max-width: 576px) {
            .wrapper.my-5 {
                margin-top: 10px !important;
                margin-bottom: 15px !important;
            }

            #restaurantLogo {
                width: 80px !important;
                height: 80px !important;
            }
        }
    </style>
</head>

    <script>
        const API_BASE = 'https://api.theboxsync.com/api';
        const IMG_BASE = 'https://api.theboxsync.com/uploads';

        function toggleCustomizations(el) {
            const content = $(el).siblings('.customization-content');
            content.slideToggle(200);
            const icon = $(el).find('i');
            icon.toggleClass('fa-chevron-down fa-chevron-up');
        }

        let menuToken = null;
        let allMenuData = [];
        let selectedFilters = ['all'];
        let activeSort = 'default';
        let searchQuery = '';

        const qs = (id) => document.getElementById(id);

        function getTokenFromURL() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('token')) return params.get('token');
            const parts = window.location.pathname.split('/').filter(Boolean);
            const last = parts[parts.length - 1];
            if (last && last !== 'menu.html') return last;
            return null;
        }

        function getTableFromURL() {
            return new URLSearchParams(window.location.search).get('table') || null;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        async function loadMenu() {
            $('#tokenLoading').show();
            $('#mainContent').hide();
            $('#tokenError').hide();

            try {
                const res = await fetch(`${API_BASE}/menu/get/token/${menuToken}`);
                const data = await res.json();
                console.log(data);

                if (!data.success) throw new Error(data.message || 'Restaurant not found.');

                qs('restaurantName').textContent = data.restaurant_name || '';

                if (data.restaurant_logo) {
                    qs('restaurantLogo').src = IMG_BASE + data.restaurant_logo;
                    qs('restaurantLogo').style.display = 'block';
                }

                const table = getTableFromURL();
                if (table) {
                    qs('headerTableNo').textContent = 'Table: ' + table;
                    qs('headerTableNo').style.display = 'block';
                }

                allMenuData = data.data || [];let hasVeg = false;let hasNonVeg = false;let hasEgg = false;allMenuData.forEach(cat => {(cat.dishes || []).forEach(dish => {const m = (dish.meal_type || cat.meal_type || '').toLowerCase();if (m === 'veg') hasVeg = true;if (m === 'non-veg' || m === 'nonveg') hasNonVeg = true;if (m === 'egg') hasEgg = true;});});if (hasVeg) {const btn = document.getElementById('filterVegBtn');if (btn) btn.style.display = 'inline-block';}if (hasNonVeg) {const btn = document.getElementById('filterNonVegBtn');if (btn) btn.style.display = 'inline-block';}if (hasEgg) {const btn = document.getElementById('filterEggBtn');if (btn) btn.style.display = 'inline-block';}

                $('#tokenLoading').hide();
                $('#mainContent').show();

                renderMenu();
                renderCategoryModal();

            } catch (err) {
                $('#tokenLoading').hide();
                $('#tokenError').show();
                qs('tokenErrorMsg').textContent = err.message;
            }
        }

        function renderMenu() {
            const list = qs('menuList');
            list.innerHTML = '';
            const q = searchQuery.toLowerCase().trim();

            allMenuData.forEach((cat, idx) => {
                let filteredDishes = (cat.dishes || []).filter(dish => {
                    // 1. Meal Type Filter (Multi-select)
                    if (!selectedFilters.includes('all')) {
                        // Check both dish and category meal type
                        const m = (dish.meal_type || cat.meal_type || '').toLowerCase();

                        const isDishNonVeg = m === 'non-veg' || m === 'nonveg';
                        const isDishVeg = m === 'veg';
                        const isDishEgg = m === 'egg';

                        let match = false;
                        if (selectedFilters.includes('veg') && isDishVeg) match = true;
                        if (selectedFilters.includes('nonveg') && isDishNonVeg) match = true;
                        if (selectedFilters.includes('egg') && isDishEgg) match = true;
                        if (selectedFilters.includes('special') && dish.is_special) match = true;
                        if (!match) return false;
                    }

                    // 2. Search Filter
                    if (q) {
                        return (dish.dish_name || '').toLowerCase().includes(q) ||
                            (dish.description || '').toLowerCase().includes(q);
                    }
                    return true;
                });

                if (filteredDishes.length === 0) return;

                // 3. Apply Sorting
                if (activeSort === 'price-low') {
                    filteredDishes.sort((a, b) => (Number(a.dish_price) || 0) - (Number(b.dish_price) || 0));
                } else if (activeSort === 'price-high') {
                    filteredDishes.sort((a, b) => (Number(b.dish_price) || 0) - (Number(a.dish_price) || 0));
                } else if (activeSort === 'name-az') {
                    filteredDishes.sort((a, b) => (a.dish_name || '').localeCompare(b.dish_name || ''));
                }

                const catId = 'cat-' + idx;
                const catHtml = `
                    <div class="col-12 menu-category" id="${catId}">
                        <h3>${escapeHtml(cat.category)}</h3>
                        <div class="row">
                            ${filteredDishes.map(dish => {
                    const m = (dish.meal_type || cat.meal_type || '').toLowerCase();
                    const dishIcon = m === 'veg' ? '<span class="veg-icon"></span>' :
                        (m === 'non-veg' || m === 'nonveg') ? '<span class="nonveg-icon"></span>' :
                            m === 'egg' ? '<span class="egg-icon"></span>' : '';

                    const placeholderImg = "assets/images/icon/menuper-2.png";
                    const imgSrc = dish.dish_img ? `${IMG_BASE}${dish.dish_img}` : placeholderImg;
                    const imgHtml = `<img class="dish-img" src="${imgSrc}" alt="${escapeHtml(dish.dish_name)}" onerror="this.src='${placeholderImg}'">`;

                    // 1. Price Formatting (range if variants exist)
                    let priceHtml = '';
                    const hasVariants = dish.has_variants && Array.isArray(dish.variants) && dish.variants.length > 0;
                    if (hasVariants) {
                        const prices = dish.variants.map(v => Number(v.price) || 0);
                        const min = Math.min(...prices);
                        const max = Math.max(...prices);
                        priceHtml = min === max ? `₹${min.toFixed(0)}/-` : `₹${min.toFixed(0)} - ₹${max.toFixed(0)}/-`;
                    } else {
                        priceHtml = `₹${Number(dish.dish_price || 0).toFixed(0)}/-`;
                    }

                    // 2. Customizable Badge
                    const hasAddons = Array.isArray(dish.addons) && dish.addons.length > 0;
                    const isCustomizable = hasVariants || hasAddons;
                    const customizableBadge = isCustomizable ? '<span class="badge-customizable">Customizable</span>' : '';

                    // 3. Customizations Collapsible html
                    let customHtml = '';
                    if (isCustomizable) {
                        let sections = '';
                        if (hasVariants) {
                            sections += `
                                <div class="customization-section">
                                    <div class="customization-section-title">Sizes</div>
                                    <div class="variant-list">
                                        ${dish.variants.map(v => `
                                            <div class="variant-item">
                                                <div class="variant-left-side">
                                                    ${v.size_name ? `<span class="variant-size">${escapeHtml(v.size_name)}</span>` : ''}
                                                    ${v.extra ? `<span class="variant-extra">(${escapeHtml(v.extra)})</span>` : ''}
                                                </div>
                                                <span class="variant-price">₹${Number(v.price || 0).toFixed(0)}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `;
                        }
                        if (hasAddons) {
                            sections += `
                                <div class="customization-section">
                                    <div class="customization-section-title">Add-ons</div>
                                    <div class="addon-list">
                                        ${dish.addons.map(a => `
                                            <div class="addon-item">
                                                <span class="addon-name">${escapeHtml(a.addon_name)}</span>
                                                <span class="addon-price">+₹${Number(a.price || 0).toFixed(0)}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `;
                        }

                        customHtml = `
                            <div class="customization-wrapper mt-2">
                                <div class="customization-toggle" onclick="toggleCustomizations(this)">
                                    <span>View Options</span><i class="fas fa-chevron-down"></i>
                                </div>
                                <div class="customization-content mt-2" style="display: none;">
                                    ${sections}
                                </div>
                            </div>
                        `;
                    }

                    return `
                                    <div class="col-lg-6">
                                        <div class="menu-item">
                                            <div class="menu-top-row">
                                                <div class="menu-main-content">
                                                    ${imgHtml}
                                                    <div class="menu-left overflow-hidden">
                                                        <h4>${dishIcon}${escapeHtml(dish.dish_name)} ${dish.is_special ? '<span class="badge-special">Special</span>' : ''} ${customizableBadge} ${dish.is_available === false ? '<span class="badge-unavailable">Out of stock</span>' : ''}</h4>
                                                        <p class="text-truncate">${escapeHtml(dish.description || '')}</p>
                                                    </div>
                                                </div>
                                                <div class="menu-right">${priceHtml}</div>
                                            </div>
                                            ${customHtml}
                                        </div>
                                    </div>
                                `;
                }).join('')}
                        </div>
                    </div>
                `;
                list.innerHTML += catHtml;
            });

            if (!list.children.length) {
                list.innerHTML = '<div class="col-12 text-center py-5 text-muted">No items found matching your selection.</div>';
            }
        }

        function renderCategoryModal() {
            const ul = qs('categoryLinks');
            ul.innerHTML = '';
            allMenuData.forEach((cat, idx) => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="#" data-cat="cat-${idx}" class="cat-link">${escapeHtml(cat.category)}</a>`;
                ul.appendChild(li);
            });

            $('.cat-link').on('click', function (e) {
                e.preventDefault();
                const catId = $(this).data('cat');
                const target = document.getElementById(catId);

                const modalEl = document.getElementById('categorylist');
                const modal = bootstrap.Modal.getInstance(modalEl);
                if (modal) modal.hide();

                setTimeout(() => {
                    if (target) {
                        const offset = 100;
                        const targetPosition = target.getBoundingClientRect().top + window.pageYOffset - offset;
                        window.scrollTo({ top: targetPosition, behavior: 'smooth' });
                    }
                }, 350);
            });
        }

        $('#menuSearch').on('input', function () {
            searchQuery = $(this).val();
            renderMenu();
        });

        document.addEventListener('DOMContentLoaded', () => {
            menuToken = getTokenFromURL();
            if (menuToken) loadMenu();
            else {
                $('#tokenLoading').hide();
                $('#tokenError').show();
                qs('tokenErrorMsg').textContent = 'No menu token found.';
            }

            // Event Listeners
            $('#menuSearch').on('input', function () {
                searchQuery = $(this).val();
                renderMenu();
            });

            $('.filter-btn').on('click', function () {
                const filter = $(this).data('filter');

                if (filter === 'all') {
                    selectedFilters = ['all'];
                } else {
                    selectedFilters = selectedFilters.filter(f => f !== 'all');
                    if (selectedFilters.includes(filter)) {
                        selectedFilters = selectedFilters.filter(f => f !== filter);
                    } else {
                        selectedFilters.push(filter);
                    }
                    if (selectedFilters.length === 0) selectedFilters = ['all'];
                }

                $('.filter-btn').removeClass('active');
                selectedFilters.forEach(f => {
                    $(`.filter-btn[data-filter="${f}"]`).addClass('active');
                });

                renderMenu();
            });

            $('#menuSort').on('change', function () {
                activeSort = $(this).val();
                renderMenu();
            });
        });
    </script>
</body>

</html>
