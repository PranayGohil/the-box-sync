    const checkSvg = `<div style="flex-shrink:0; display:flex; align-items:center; margin-top:3px;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 15 15" fill="none"><path opacity="0.992" fill-rule="evenodd" clip-rule="evenodd" d="M7.22393 0C10.1444 0.0048682 12.3871 1.22628 13.952 3.66423C15.1321 5.76513 15.3168 7.95136 14.5062 10.2229C13.3721 12.8859 11.3758 14.4614 8.51719 14.9495C5.62984 15.2424 3.28454 14.2622 1.48125 12.0088C-0.0776275 9.77987 -0.406074 7.37811 0.495906 4.80353C1.26674 2.9139 2.5754 1.53341 4.42187 0.662026C5.31983 0.270692 6.25384 0.0500183 7.22393 0ZM11.2269 4.43403C11.6225 4.43526 11.7508 4.62002 11.6118 4.98829C9.90797 6.93843 8.20413 8.8886 6.50032 10.8387C6.34295 10.9814 6.17359 10.9968 5.99226 10.8849C5.24811 9.89445 4.50399 8.904 3.75985 7.91352C3.63052 7.68883 3.67671 7.50922 3.89841 7.37466C3.99079 7.35412 4.08316 7.35412 4.17554 7.37466C4.74004 7.75441 5.30458 8.1342 5.86909 8.51396C6.02234 8.62678 6.18659 8.64729 6.36176 8.57554C7.97994 7.1872 9.60165 5.80667 11.2269 4.43403Z" fill="#54daff" /></svg></div>`;

    let currentBillingPeriod = 'yearly';

    function renderPricingPlans() {
      const container = document.getElementById('pricing-plans-container');
      if (!container) return;

      container.innerHTML = plansData.map(plan => {
        const popularBadge = plan.isPopular
          ? `<span class="badge" style="position:absolute; top:-15px; left:50%; transform:translateX(-50%); background-color:#28a745; color:white; padding:8px 14px; font-size:12px; font-weight:bold; border-radius:15px; letter-spacing:0.5px;">MOST POPULAR</span>`
          : '';

        const priceInfo = plan.prices[currentBillingPeriod];

        const featuresHtml = plan.features.map(cat => {
          const itemsHtml = cat.items.map(item => {
            const icon = item.checked ? checkSvg : crossSvg;
            return `
              <li style="font-size:15px; margin-bottom:10px; display:flex; align-items:flex-start; gap:10px; line-height:1.5;">
                ${icon}
                <div>${item.name}</div>
              </li>`;
          }).join('');

          return `
            <li>
              <h4 style="font-size:15px; margin-top:20px; margin-bottom:12px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: #111;">
                ${cat.category}
              </h4>
            </li>
            ${itemsHtml}`;
        }).join('');

        return `
          <div class="col-xl px-2 col-md-6 mb-4">
            <div class="pricing-card style1 position-relative" style="padding: 40px 25px;">
              ${popularBadge}
              <div class="pricing-card-header" style="margin-bottom:15px; padding-bottom:15px; border-bottom:1px solid rgba(0,0,0,0.05);">
                <h6 style="font-size: 22px; margin-bottom: 8px; text-transform: uppercase; font-weight: 800;">${plan.name}</h6>
                <div class="price-wrapper" style="margin-bottom:10px;">
                  <span class="price" style="font-size: 32px; font-weight: 800;">${priceInfo.price}</span>
                  <span class="period" style="font-size: 14px; color: #777;">/ ${priceInfo.period}</span>
                  <span class="actualprice text-decoration-line-through text-muted" style="font-size: 15px; margin-left:8px;">${priceInfo.actualPrice}</span>
                </div>
                <p class="text" style="font-size: 14px; line-height:1.5;">${plan.tagline}</p>
              </div>
              <div class="pricing-card-body">
                <ul class="checklist" style="list-style: none; padding: 0; margin: 0;">
                  ${featuresHtml}
                </ul>
              </div>
              <div style="margin-top:30px;">
                <a class="theme-btn style5 search-trigger w-100 text-center" style="padding:15px 15px; font-size:16px;" href="#search-wrap"> Send Enquiry </a>

      }).join('');
    }

    document.addEventListener('DOMContentLoaded', function () {
      renderPricingPlans();

      // Switch billing period event listeners
      document.getElementById('btn-monthly').addEventListener('click', function () {
        currentBillingPeriod = 'monthly';
        this.classList.add('active');
        document.getElementById('btn-yearly').classList.remove('active');
        renderPricingPlans();
        attachSearchTriggers();
      });

      document.getElementById('btn-yearly').addEventListener('click', function () {
        currentBillingPeriod = 'yearly';
        this.classList.add('active');
        document.getElementById('btn-monthly').classList.remove('active');
        renderPricingPlans();
        attachSearchTriggers();
      });

      const enquiryForm = document.querySelector('.search-wrap form');
      if (!enquiryForm) return;

      let selectedPlan = '';
      function attachSearchTriggers() {
        document.querySelectorAll('.search-trigger').forEach(function (btn) {
          btn.addEventListener('click', function () {
            const card = btn.closest('.pricing-card');
            selectedPlan = card ? card.querySelector('h6').textContent.trim() : '';
          });
        });
      }
      attachSearchTriggers();

      // ── Validation helpers ──────────────────────────────
      function isValidEmail(email) {
        return /^[^s@]+@[^s@]+.[^s@]+$/.test(email);
      }
      function isValidPhone(phone) {
        return /^\+?[1-9][0-9]{7,14}$/.test(phone.replace(/\s+/g, ''));
      }
      function setError(input, msg) {
        input.style.borderColor = '#dc3545';
        const id = 'enq-err-' + input.name;
        let err = document.getElementById(id);
        if (!err) {
          err = document.createElement('small');
          err.id = id;
          err.style.cssText = 'color:#dc3545;display:block;margin-top:4px;font-size:12px;';
          input.parentNode.appendChild(err);
        }
        err.textContent = msg;
      }
      function clearError(input) {
        input.style.borderColor = '';
        const err = document.getElementById('enq-err-' + input.name);
        if (err) err.remove();
      }
      function clearAllErrors() {
        enquiryForm.querySelectorAll('input, textarea').forEach(clearError);
      }

      // Clear on input
      enquiryForm.querySelectorAll('input, textarea').forEach(function (el) {
        el.addEventListener('input', function () { clearError(el); });
      });

      enquiryForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearAllErrors();

        const nameEl = enquiryForm.querySelector('input[name="name"]');
        const emailEl = enquiryForm.querySelector('input[name="email2"]');
        const phoneEl = enquiryForm.querySelector('input[name="phone"]');
        const messageEl = enquiryForm.querySelector('textarea[name="message"]');

        const name = nameEl.value.trim();
        const email2 = emailEl.value.trim();
        const phone = phoneEl.value.trim();
        const message = messageEl.value.trim();

        // ── Validate ────────────────────────────────────────
        let hasError = false;
        if (!name) {
          setError(nameEl, 'Name is required.'); hasError = true;
        } else if (name.length < 2) {
          setError(nameEl, 'Name must be at least 2 characters.'); hasError = true;
        }
        if (!email2) {
          setError(emailEl, 'Email is required.'); hasError = true;
        } else if (!isValidEmail(email2)) {
          setError(emailEl, 'Please enter a valid email address.'); hasError = true;
        }
        if (!phone) {
          setError(phoneEl, 'Phone number is required.'); hasError = true;
        } else if (!isValidPhone(phone)) {
          setError(phoneEl, 'Enter a valid mobile number.'); hasError = true;
        }
        if (!message) {
          setError(messageEl, 'Message is required.'); hasError = true;
        } else if (message.length < 10) {
          setError(messageEl, 'Message must be at least 10 characters.'); hasError = true;
        }
        if (hasError) return;

        // ── Submit ──────────────────────────────────────────
        const submitBtn = enquiryForm.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = 'Sending... <i class="fa-solid fa-spinner fa-spin ms-1"></i>';

        try {
          const response = await fetch('https://api.theboxsync.com/api/user/enquiry', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email2, phone, plan: selectedPlan, message }),
          });
          const data = await response.json();

          const existing = document.getElementById('enquiry-alert');
          if (existing) existing.remove();
          const alertDiv = document.createElement('div');
          alertDiv.id = 'enquiry-alert';
          alertDiv.style.cssText = `
          padding:14px 18px;border-radius:6px;margin-top:16px;
          font-size:15px;font-weight:500;
          ${data.success
              ? 'background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;'
              : 'background:#ffebee;color:#c62828;border:1px solid #ef9a9a;'}
        `;
          alertDiv.textContent = data.success
            ? "✅ Enquiry sent! We'll get back to you soon."
            : '❌ ' + (data.message || 'Something went wrong.');

          const submitRow = enquiryForm.querySelector('.col-lg-7');
          submitRow.parentNode.insertBefore(alertDiv, submitRow.nextSibling);

          if (data.success) {
            enquiryForm.reset();
            setTimeout(function () {
              alertDiv.remove();
              const closeBtn = document.getElementById('search-close');
              if (closeBtn) closeBtn.click();
            }, 2500);
          } else {
            setTimeout(function () { alertDiv.remove(); }, 6000);
          }
        } catch (err) {
          console.error(err);
          alert('❌ Network error. Please check your connection.');
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        }
      });
    });
  </script>

</body>
