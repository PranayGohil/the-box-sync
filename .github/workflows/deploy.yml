name: Deploy Monorepo to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: SSH & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Run Remote Deployment Script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Source system and user profiles to load Node.js/NVM environment
            set +e
            [ -f /etc/profile ] && . /etc/profile
            [ -f ~/.profile ] && . ~/.profile
            [ -f ~/.bashrc ] && . ~/.bashrc
            [ -f ~/.nvm/nvm.sh ] && . ~/.nvm/nvm.sh
            command -v nvm >/dev/null 2>&1 && nvm use default
            set -e
            
            cd ${{ secrets.PROJECT_PATH }}
            BRANCH="${{ github.ref_name }}"
            # Save the current commit hash before pulling new changes
            PREV_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "")
            # Pull the latest changes for the pushed branch on the VPS
            git fetch origin "$BRANCH"
            git reset --hard origin/"$BRANCH"
            # Make deploy.sh executable and run it
            chmod +x deploy.sh
            if [ -n "$PREV_COMMIT" ]; then
              ./deploy.sh "$PREV_COMMIT"
            else
              ./deploy.sh
            fi
